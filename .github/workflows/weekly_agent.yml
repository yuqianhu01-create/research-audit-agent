name: Weekly Research Audit Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Research Agent
        run: python scripts/research_agent.py --section academic --limit 10

      - name: Run Audit Agent
        run: python scripts/audit_agent.py --input data/candidates.json

      - name: Upload agent output
        uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: |
            data/candidates.json
            data/audit_report.json
            data/published_registry.json
